name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_ENABLED: "false"
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      REDIS_URL: "redis://localhost:6379"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest tests/ -v --tb=short
          else
            echo "Geen tests map gevonden, stap overgeslagen."
          fi

  mcp:
    name: MCP (etf-data-mcp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/etf-data-mcp

    env:
      AUTH_ENABLED: "false"
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      REDIS_URL: "redis://localhost:6379"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: mcp/etf-data-mcp/uv.lock

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: |
          if [ -d "../tests" ]; then
            uv run pytest ../tests/ -v --tb=short
          else
            echo "Geen tests map gevonden, stap overgeslagen."
          fi
