name: Security Scan

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Elke maandag om 06:00 UTC

jobs:
  pip-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies
        run: uv sync --dev

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Run pip-audit
        run: uv run pip-audit --requirement <(uv export --no-dev --format requirements-txt)

  mcp-pip-audit:
    name: MCP dependency audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/etf-data-mcp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: mcp/etf-data-mcp/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Run pip-audit
        run: uv run pip-audit --requirement <(uv export --no-dev --format requirements-txt)

  pnpm-audit:
    name: Frontend dependency audit (pnpm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
